apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonarqube-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/marwan-ghonem/sonarqube
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
